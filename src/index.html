<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Temperature Converter</h1>
      <p class="subtitle">Celsius · Fahrenheit · Kelvin</p>
    </div>

    <div class="input-section">
      <div class="input-group">
        <label for="temp-value">Enter value</label>
        <input type="number" id="temp-value" step="any" placeholder="e.g. 25" autofocus>
      </div>

      <div class="input-group">
        <label>From</label>
        <div class="segmented-control" id="unit-selector">
          <button class="segmented-option active" data-unit="celsius">°C</button>
          <button class="segmented-option" data-unit="fahrenheit">°F</button>
          <button class="segmented-option" data-unit="kelvin">K</button>
        </div>
      </div>
    </div>

    <div class="results" id="results">
      <div class="result-card" data-unit="celsius">
        <div class="result-accent"></div>
        <div class="result-body">
          <span class="result-label">Celsius</span>
          <span class="result-value" id="result-celsius">—</span>
        </div>
      </div>
      <div class="result-card" data-unit="fahrenheit">
        <div class="result-accent"></div>
        <div class="result-body">
          <span class="result-label">Fahrenheit</span>
          <span class="result-value" id="result-fahrenheit">—</span>
        </div>
      </div>
      <div class="result-card" data-unit="kelvin">
        <div class="result-accent"></div>
        <div class="result-body">
          <span class="result-label">Kelvin</span>
          <span class="result-value" id="result-kelvin">—</span>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
